<!DOCTYPE html>
<html>
<head>
<title>Coin Flip</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Layout */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 40px;
}

/* Title */
.title {
  font-size: 38px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #22c55e, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Coin */
.coin-wrapper {
  margin-top: 30px;
  margin-bottom: 20px;
}

.coin {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
}

/* Animation */
.flip {
  animation: flipAnim 1s ease-in-out infinite;
}

@keyframes flipAnim {
  0% { transform: rotateY(0); }
  50% { transform: rotateY(180deg) scale(1.2); }
  100% { transform: rotateY(360deg); }
}

/* Input */
.input {
  padding: 14px;
  width: 250px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  text-align: center;
  font-size: 16px;
  outline: none;
}

/* Info */
.info {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  font-size: 14px;
}

/* Choices */
.choices {
  margin-top: 20px;
  display: flex;
  gap: 12px;
}

.choices button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

/* ACTIVE STATES */
.heads-active {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  box-shadow: 0 0 15px #22c55e;
}

.tails-active {
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  box-shadow: 0 0 15px #3b82f6;
}

/* Flip button */
.flip-btn {
  margin-top: 25px;
  padding: 14px;
  width: 250px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  cursor: pointer;
  background: linear-gradient(90deg, #f59e0b, #f97316);
}

/* Result */
.result {
  margin-top: 25px;
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title"> Coin Flip</h1>

<div class="coin-wrapper">
<img id="coin" src="heads.jpeg" class="coin">
</div>

<input
  class="input"
  type="number"
  id="bet"
  placeholder="Enter bet (ETH)"
/>

<div id="info"></div>

<div class="choices">
<button id="headsBtn" onclick="setChoice('heads')">Heads</button>
<button id="tailsBtn" onclick="setChoice('tails')">Tails</button>
</div>

<button class="flip-btn" onclick="flipCoin()">Flip Coin</button>

<h2 class="result" id="result"></h2>

</div>

<script>
let choice = null

function updateInfo(){
  const bet = document.getElementById("bet").value

  if(!bet || bet <= 0 || !choice){
    document.getElementById("info").innerHTML = ""
    return
  }

  const winAmount = (parseFloat(bet) * 1.8).toFixed(4)

  document.getElementById("info").innerHTML = `
    <div class="info">
      💰 Bet: ${bet} ETH <br>
      🎯 Win: <b>${winAmount} ETH</b><br>
      ⚠️ Lose: Full bet
    </div>
  `
}

function setChoice(c){
  choice = c

  const heads = document.getElementById("headsBtn")
  const tails = document.getElementById("tailsBtn")

  heads.classList.remove("heads-active")
  tails.classList.remove("tails-active")

  if(c === "heads"){
    heads.classList.add("heads-active")
  } else {
    tails.classList.add("tails-active")
  }

  updateInfo()
}

function flipCoin(){

  const bet = document.getElementById("bet").value

  if(!bet || bet <= 0){
    alert("Enter valid bet")
    return
  }

  if(!choice){
    alert("Select Heads or Tails")
    return
  }

  const coin = document.getElementById("coin")
  const resultText = document.getElementById("result")

  coin.classList.add("flip")
  resultText.innerText = ""

  setTimeout(() => {

    coin.classList.remove("flip")

    const random = Math.random() < 0.5 ? "heads" : "tails"
    coin.src = random === "heads" ? "heads.jpeg" : "tails.jpeg"

    const winAmount = (parseFloat(bet) * 1.8).toFixed(4)

    if(random === choice){
      resultText.innerText = `🎉 You WON +${winAmount} ETH`
    } else {
      resultText.innerText = "❌ You LOST"
    }

  }, 2000)
}

// update info when bet changes
document.getElementById("bet").addEventListener("input", updateInfo)

</script>

</body>
</html>
