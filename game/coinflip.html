<!DOCTYPE html>
<html>
<head>
  <title>💰 Coin Flip</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f172a);
      color: white;
      text-align: center;
    }

    .game-card {
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      background: #111827;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,255,174,0.2);
    }

    .coin {
      width: 140px;
      margin: 20px auto;
      display: block;
      transform-style: preserve-3d;
    }

    .flip {
      animation: flipAnim 0.7s ease-in-out infinite;
    }

    /* 🔥 TOP-BOTTOM FLIP */
    @keyframes flipAnim {
      0% { transform: rotateX(0deg) scale(1); }
      50% { transform: rotateX(540deg) scale(1.1); }
      100% { transform: rotateX(1080deg) scale(1); }
    }

    .choices img {
      width: 100px;
      cursor: pointer;
      margin: 10px;
      border-radius: 50%;
      transition: 0.2s;
    }

    .choices img:hover {
      transform: scale(1.1);
    }

    .selected {
      border: 3px solid #00ffae;
      box-shadow: 0 0 15px #00ffae;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      width: 80%;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffae;
      cursor: pointer;
      font-weight: bold;
    }

    .play-again {
      background: #1f2937;
      color: #00ffae;
      border: 1px solid #00ffae;
    }
  </style>
</head>

<body>

<div class="game-card">
  <h2>💰 Coin Flip</h2>

  <img id="coin" class="coin"
    src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/heads.png">

  <div class="choices">
    <img id="heads"
      src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/heads.png"
      onclick="selectChoice(0)">
    <img id="tails"
      src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/tails.png"
      onclick="selectChoice(1)">
  </div>

  <input id="bet" type="number" step="0.01" placeholder="Enter ETH">

  <p id="betInfo"></p>
  <p id="streak">🔥 Streak: 0</p>

  <button onclick="flip()">Flip</button>
  <button class="play-again" onclick="flip()">⚡ Flip Again</button>

  <h3 id="result">Waiting...</h3>
</div>

<script src="https://unpkg.com/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script type="module">
import { connectWallet, playCoinFlip } from "./game.js";

let choice = null;
let lastChoice = null;
let isPlaying = false;
let streak = 0;

window.onload = async () => {
  await connectWallet();
};

// choice
window.selectChoice = (val) => {
  choice = val;

  document.getElementById("heads").classList.remove("selected");
  document.getElementById("tails").classList.remove("selected");

  if (val === 0) {
    document.getElementById("heads").classList.add("selected");
  } else {
    document.getElementById("tails").classList.add("selected");
  }
};

// 🔥 BET INFO WITH LOSS
document.getElementById("bet").addEventListener("input", (e) => {
  const val = Number(e.target.value);

  if (!val || val <= 0) {
    document.getElementById("betInfo").innerHTML = "";
    return;
  }

  document.getElementById("betInfo").innerHTML =
    `💰 Bet: ${val.toFixed(4)} ETH <br>
     🎯 Win: <b>${(val * 1.8).toFixed(4)} ETH</b><br>
     ⚠️ Lose: ${val.toFixed(4)} ETH`;
});

// flip
window.flip = async () => {

  if (isPlaying) return;

  const bet = Number(document.getElementById("bet").value);
  const resultBox = document.getElementById("result");
  const coin = document.getElementById("coin");

  if (choice === null) {
    resultBox.innerText = "⚠️ Select Heads or Tails";
    return;
  }

  if (!bet || bet <= 0) {
    resultBox.innerText = "⚠️ Enter valid bet";
    return;
  }

  try {
    isPlaying = true;
    lastChoice = choice;

    resultBox.innerText = "🎡 Flipping...";

    coin.style.animationDuration =
      (Math.random() * 0.5 + 0.5) + "s";

    coin.classList.add("flip");

    const res = await playCoinFlip(choice, bet);

    coin.classList.remove("flip");

    let resultSide = res.win
      ? lastChoice
      : (lastChoice === 0 ? 1 : 0);

    coin.src = resultSide === 0
      ? "https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/heads.png"
      : "https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/tails.png";

    if (res.win) {
      streak++;
      resultBox.innerText = `🎉 Won ${res.amount} ETH`;
      document.body.style.background =
        "radial-gradient(circle, #00ffae, #000)";
    } else {
      streak = 0;
      resultBox.innerText = `😬 Lost ${bet} ETH`;
      document.body.style.background =
        "radial-gradient(circle, #ff4d4d, #000)";
    }

    document.getElementById("streak").innerText =
      `🔥 Streak: ${streak}`;

    isPlaying = false;

  } catch (err) {
    console.error(err);

    coin.classList.remove("flip");
    isPlaying = false;

    resultBox.innerText = "❌ Error (check vault / limits)";
  }
};
</script>

</body>
</html>
