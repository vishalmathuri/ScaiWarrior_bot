<!DOCTYPE html>
<html>
<head>
  <title>🎲 Casino Dice</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f172a);
      color: white;
      text-align: center;
      transition: background 0.5s ease;
    }

    .game-card {
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
      background: #111827;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,255,174,0.2);
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      width: 80%;
      text-align: center;
      font-size: 16px;
    }

    .choices button {
      margin: 8px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #1f2937;
      color: white;
      transition: 0.2s;
    }

    .selected {
      background: #00ffae !important;
      color: black !important;
      box-shadow: 0 0 15px #00ffae;
    }

    button.play {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffae;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    button.play:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .dice {
      width: 80px;
      margin: 5px;
    }

    #result {
      min-height: 40px;
      margin-top: 20px;
    }

    #betInfo {
      min-height: 50px;
    }
  </style>
</head>

<body>

<div class="game-card">
  <h2>🎲 Casino Dice</h2>

  <div>
    <img id="dice1" class="dice"
      src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/dice1.png">
    <img id="dice2" class="dice"
      src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/dice1.png">
  </div>

  <input id="bet" type="number" step="0.01" placeholder="Enter ETH">

  <p id="betInfo"></p>

  <div class="choices">
    <button id="under" onclick="setChoice(0)">⬇ Under 7 (2x)</button>
    <button id="exact" onclick="setChoice(1)">🎯 Exact 7 (5x)</button>
    <button id="over" onclick="setChoice(2)">⬆ Over 7 (2x)</button>
  </div>

  <button id="playBtn" class="play" onclick="play()">Roll Dice</button>

  <h3 id="result">Waiting...</h3>
</div>

<script type="module">
import { connectWallet, playDice } from "./game.js";

let choice = 0;
let rollInterval;

// ================= CONNECT WALLET =================
window.onload = async () => {
  await connectWallet();
  setChoice(0);
};

// ================= UPDATE BET INFO =================
function updateBetInfo() {
  const val = Number(document.getElementById("bet").value);

  if (!val || val <= 0) {
    document.getElementById("betInfo").innerHTML = "";
    return;
  }

  let multiplier = choice === 1 ? 5 : 2;

  document.getElementById("betInfo").innerHTML =
    `💰 Bet: ${val.toFixed(4)} ETH <br>
     🎯 Win: <b>${(val * multiplier).toFixed(4)} ETH</b><br>
     ⚠️ Lose: ${val.toFixed(4)} ETH`;
}

// ================= CHOICE =================
window.setChoice = (c) => {
  choice = c;

  document.getElementById("under").classList.remove("selected");
  document.getElementById("exact").classList.remove("selected");
  document.getElementById("over").classList.remove("selected");

  if (c === 0) document.getElementById("under").classList.add("selected");
  if (c === 1) document.getElementById("exact").classList.add("selected");
  if (c === 2) document.getElementById("over").classList.add("selected");

  updateBetInfo();
};

document.getElementById("bet").addEventListener("input", updateBetInfo);

// ================= ROLLING ANIMATION =================
function startRolling() {
  const d1 = document.getElementById("dice1");
  const d2 = document.getElementById("dice2");

  rollInterval = setInterval(() => {
    const r1 = Math.floor(Math.random() * 6) + 1;
    const r2 = Math.floor(Math.random() * 6) + 1;

    d1.src = `https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/dice${r1}.png`;
    d2.src = `https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/dice${r2}.png`;
  }, 100);
}

function stopRolling() {
  clearInterval(rollInterval);
}

// ================= PLAY GAME =================
window.play = async () => {
  const bet = Number(document.getElementById("bet").value);
  const resultBox = document.getElementById("result");
  const playBtn = document.getElementById("playBtn");

  if (!bet || bet <= 0) {
    resultBox.innerText = "⚠️ Enter valid bet";
    return;
  }

  playBtn.disabled = true;
  resultBox.innerText = "🎲 Rolling...";
  startRolling();

  try {
    const data = await playDice(choice, bet);

    stopRolling();

    const d1 = document.getElementById("dice1");
    const d2 = document.getElementById("dice2");

    d1.src = `https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/dice${data.d1}.png`;
    d2.src = `https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/dice${data.d2}.png`;

    let multiplier = choice === 1 ? 5 : 2;

    if (data.win) {
      resultBox.innerText =
        `🎉 YOU WON! ${ (bet * multiplier).toFixed(4) } ETH`;

      document.body.style.background =
        "radial-gradient(circle, #00ffae, #000)";
    } else {
      resultBox.innerText =
        `💀 YOU LOST ${bet.toFixed(4)} ETH`;

      document.body.style.background =
        "radial-gradient(circle, #ff4d4d, #000)";
    }

  } catch (err) {
    console.error(err);
    stopRolling();
    resultBox.innerText = "❌ Failed";
  }

  playBtn.disabled = false;
};
</script>

</body>
</html>
