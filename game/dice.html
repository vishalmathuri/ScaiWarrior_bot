<!DOCTYPE html>
<html>
<head>
<title>Dice Game</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 40px;
}

.title {
  font-size: 36px;
  background: linear-gradient(90deg,#22c55e,#3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Dice */
.dice-wrapper {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.dice {
  width: 90px;
  height: 90px;
  border-radius: 16px;
  box-shadow: 0 0 25px rgba(59,130,246,0.4);
  transition: 0.3s;
}

/* Rolling animation */
.roll {
  animation: roll 0.6s infinite;
}

@keyframes roll {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); }
}

/* Input */
.input {
  margin-top: 20px;
  padding: 14px;
  width: 250px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  text-align: center;
}

/* Choices */
.choices {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.choices button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.under-active {
  background: linear-gradient(90deg,#22c55e,#16a34a);
  box-shadow: 0 0 15px #22c55e;
}

.over-active {
  background: linear-gradient(90deg,#3b82f6,#2563eb);
  box-shadow: 0 0 15px #3b82f6;
}

.exact-active {
  background: linear-gradient(90deg,#f59e0b,#f97316);
  box-shadow: 0 0 15px #f59e0b;
}

/* Info */
.info {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(59,130,246,0.15);
}

/* Button */
.roll-btn {
  margin-top: 25px;
  padding: 14px;
  width: 250px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  background: linear-gradient(90deg,#f59e0b,#f97316);
  cursor: pointer;
}

/* Result */
.result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">🎲 Dice Game</h1>

<div class="dice-wrapper">
<img id="dice1" class="dice" src="dice1.png">
<img id="dice2" class="dice" src="dice2.png">
</div>

<input id="bet" class="input" type="number" placeholder="Enter bet (ETH)">

<div id="info"></div>

<div class="choices">
<button id="underBtn" onclick="setChoice('under')">Under 7</button>
<button id="exactBtn" onclick="setChoice('exact')">Exact 7</button>
<button id="overBtn" onclick="setChoice('over')">Over 7</button>
</div>

<button class="roll-btn" onclick="rollDice()">Roll Dice</button>

<div id="result" class="result"></div>

</div>

<script>
let choice = null

function updateInfo(){
  const bet = document.getElementById("bet").value
  if(!bet || !choice) return

  let multiplier = choice==="exact" ? 5 : 1.8
  let win = (bet * multiplier).toFixed(4)

  document.getElementById("info").innerHTML = `
    <div class="info">
      💰 Bet: ${bet} ETH <br>
      🎯 Win: <b>${win} ETH</b><br>
      ⚠️ Lose: Full bet
    </div>
  `
}

function setChoice(c){
  choice = c

  document.getElementById("underBtn").className=""
  document.getElementById("overBtn").className=""
  document.getElementById("exactBtn").className=""

  if(c==="under") document.getElementById("underBtn").classList.add("under-active")
  if(c==="over") document.getElementById("overBtn").classList.add("over-active")
  if(c==="exact") document.getElementById("exactBtn").classList.add("exact-active")

  updateInfo()
}

function rollDice(){
  const bet = document.getElementById("bet").value

  if(!bet || bet<=0){
    alert("Enter valid bet")
    return
  }

  if(!choice){
    alert("Select option")
    return
  }

  const d1 = document.getElementById("dice1")
  const d2 = document.getElementById("dice2")

  d1.classList.add("roll")
  d2.classList.add("roll")

  let interval = setInterval(()=>{
    d1.src = "dice" + (Math.floor(Math.random()*6)+1) + ".png"
    d2.src = "dice" + (Math.floor(Math.random()*6)+1) + ".png"
  },100)

  setTimeout(()=>{
    clearInterval(interval)

    d1.classList.remove("roll")
    d2.classList.remove("roll")

    const r1 = Math.floor(Math.random()*6)+1
    const r2 = Math.floor(Math.random()*6)+1

    d1.src = "dice" + r1 + ".png"
    d2.src = "dice" + r2 + ".png"

    const sum = r1 + r2

    let win = false

    if(choice==="under" && sum<7) win=true
    if(choice==="over" && sum>7) win=true
    if(choice==="exact" && sum===7) win=true

    let multiplier = choice==="exact" ? 5 : 1.8
    let winAmount = (bet * multiplier).toFixed(4)

    if(win){
      document.getElementById("result").innerText =
        `🎉 You WON! Sum = ${sum} (+${winAmount} ETH)`
    } else {
      document.getElementById("result").innerText =
        `❌ You LOST! Sum = ${sum}`
    }

  },1200)
}

document.getElementById("bet").addEventListener("input", updateInfo)

</script>

</body>
</html>
