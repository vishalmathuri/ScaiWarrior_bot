<!DOCTYPE html>
<html>
<head>
  <title>Web3 Casino</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Ethers -->
  <script src="https://unpkg.com/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <link rel="icon" href="data:,">

  <style>
    body {
      margin:0;
      font-family:Poppins;
      background: radial-gradient(circle at top,#0f172a,#020617);
      color:white;
      text-align:center;
    }

    .header { padding:20px; }

    .title {
      font-size:30px;
      margin-bottom:10px;
    }

    .wallet {
      font-size:12px;
      color:#22c55e;
      margin-top:10px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
      padding:20px;
    }

    .card {
      padding:20px;
      border-radius:16px;
      background:rgba(255,255,255,0.05);
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover {
      transform:scale(1.05);
      background:rgba(255,255,255,0.1);
    }

    button {
      padding:10px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      margin:5px;
      background:linear-gradient(45deg,#3b82f6,#06b6d4);
      color:white;
      font-weight:bold;
    }

    .okx-btn {
      background:linear-gradient(45deg,#22c55e,#16a34a);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title">🎰 Web3 Casino</div>

    <!-- ✅ WALLET BUTTONS -->
    <button id="connectBtn">Connect Wallet</button>
    <button class="okx-btn" onclick="openOKX()">Open OKX Wallet</button>

    <div id="wallet" class="wallet">Not connected</div>
  </div>

  <div class="grid">
    <div class="card" onclick="go('coinflip.html')">💰 CoinFlip</div>
    <div class="card" onclick="go('dice.html')">🎲 Dice</div>
    <div class="card" onclick="go('wheel.html')">🎡 Wheel</div>
    <div class="card" onclick="go('king.html')">👑 King</div>
  </div>

  <script type="module">
    import { connectWallet } from "./game.js";

    const btn = document.getElementById("connectBtn");
    const walletText = document.getElementById("wallet");

    btn.onclick = async () => {
      const address = await connectWallet();

      if (!address) {
        walletText.innerText = "❌ Not connected";
        return;
      }

      walletText.innerText =
        "Connected: " +
        address.slice(0, 6) +
        "..." +
        address.slice(-4);
    };

    // ✅ OKX DEEP LINK
    window.openOKX = () => {
      const url = window.location.href;

      window.location.href =
        "okx://wallet/dapp/url?dappUrl=" + encodeURIComponent(url);
    };

    window.go = (page) => {
      window.location.href = page;
    };

    // ✅ SMART HINT (Mobile Users)
    const isMobile = /Android|iPhone/i.test(navigator.userAgent);
    if (isMobile) {
      console.log("📱 Mobile detected - suggest OKX Wallet");
    }
  </script>

</body>
</html>
