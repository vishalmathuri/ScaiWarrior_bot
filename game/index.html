<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Web3 Casino | Lobby</title>

  <script>
    window.global = window;
    window.process = { env: {} };
  </script>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }

    .wallet-status {
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>🎰 Web3 Casino</h1>
  <p>Fair games on Sepolia Testnet</p>

  <button id="connectBtn">Connect Wallet</button>

  <div class="wallet-status" id="walletText">
    Wallet Disconnected
  </div>

  <script type="module">
    import { connectWallet } from "./game.js";

    // Safe Telegram init
    if (
      window.Telegram &&
      window.Telegram.WebApp &&
      window.Telegram.WebApp.initData !== undefined
    ) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    const btn = document.getElementById("connectBtn");
    const walletText = document.getElementById("walletText");

    function updateUI(address) {
      if (address) {
        btn.style.display = "none";
        walletText.innerText =
          address.slice(0, 6) + "..." + address.slice(-4);
      } else {
        btn.style.display = "inline-block";
        walletText.innerText = "Wallet Disconnected";
      }
    }

    // Auto reconnect
    const saved = localStorage.getItem("wallet");
    if (saved) {
      updateUI(saved);
    }

    btn.onclick = async () => {
      try {
        btn.disabled = true;
        btn.innerText = "Connecting...";

        const address = await connectWallet();

        if (!address) {
          throw new Error("No address returned");
        }

        localStorage.setItem("wallet", address);
        updateUI(address);

      } catch (err) {
        console.error(err);
        alert("Wallet connection failed");
        updateUI(null);
      } finally {
        btn.disabled = false;
        btn.innerText = "Connect Wallet";
      }
    };
  </script>

</body>
</html>
