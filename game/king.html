<!DOCTYPE html>
<html>
<head>
  <title>👑 King Game</title>

  <!-- ✅ ethers v6 -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f172a);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: gold;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 120px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card3d {
      width: 100px;
      height: 140px;
      perspective: 1000px;
      cursor: pointer;
    }

    .inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card3d.flip .inner {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
    }

    .front { transform: rotateY(180deg); }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .selected {
      outline: 3px solid gold;
      transform: scale(1.1);
    }

    .win { box-shadow: 0 0 20px lime; }
    .lose { box-shadow: 0 0 20px red; }

    #result {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>👑 King Game</h1>

<button onclick="connectWallet()">🔗 Connect Wallet</button>

<div>
  <input id="bet" type="number" placeholder="Bet ETH">
  <button onclick="confirmPick()">🎯 Confirm</button>
</div>

<div class="cards" id="cards"></div>
<div id="result"></div>

<script type="module">
import { playKing } from "./game.js";

let selectedIndex = null;
let isPlaying = false;

// ================= WALLET =================
window.connectWallet = async function () {
  if (!window.ethereum) return alert("Install MetaMask");
  await window.ethereum.request({ method: "eth_requestAccounts" });
  alert("✅ Wallet Connected");
};

// ================= RENDER =================
function renderCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  const preview = ["king", "queen", "queen"]
    .sort(() => Math.random() - 0.5);

  preview.forEach((type, i) => {
    const card = document.createElement("div");
    card.className = "card3d";

    card.innerHTML = `
      <div class="inner">
        <div class="front">
          <img src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/${type}.png"
               style="filter: blur(8px); opacity:0.6;">
        </div>
        <div class="back">
          <img src="https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/card-back.png">
        </div>
      </div>
    `;

    card.onclick = () => selectCard(i);
    container.appendChild(card);
  });
}

// ================= SELECT =================
function selectCard(index) {
  if (isPlaying) return;

  selectedIndex = index;

  let all = document.querySelectorAll(".card3d");
  all.forEach(c => c.classList.remove("selected"));
  all[index].classList.add("selected");
}

// ================= REVEAL =================
function revealCards(kingIndex) {
  const all = document.querySelectorAll(".card3d");

  all.forEach((card, i) => {
    const img = card.querySelector(".front img");

    if (i === kingIndex) {
      img.src = "https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/king.png";
    } else {
      img.src = "https://raw.githubusercontent.com/vishalmathuri/ScaiWarrior_bot/main/game/assets/queen.png";
    }

    img.style.filter = "none";
    img.style.opacity = "1";
  });
}

// ================= FLIP =================
function flipAll(show) {
  document.querySelectorAll(".card3d").forEach(card => {
    show ? card.classList.add("flip") : card.classList.remove("flip");
  });
}

// ================= PLAY =================
window.confirmPick = async function () {
  const bet = document.getElementById("bet").value;

  if (selectedIndex === null) return alert("Select card");
  if (!bet || bet <= 0) return alert("Invalid bet");
  if (isPlaying) return;

  const resultBox = document.getElementById("result");

  try {
    isPlaying = true;
    resultBox.innerText = "⏳ Playing...";

    const res = await playKing(Number(selectedIndex), bet);

    // 🔥 sync UI with contract
    revealCards(res.kingIndex);

    // delay for suspense
    await new Promise(r => setTimeout(r, 600));

    flipAll(true);

    let all = document.querySelectorAll(".card3d");

    if (res.win) {
      all[selectedIndex].classList.add("win");
      resultBox.innerText = "🎉 YOU WON!";
    } else {
      all[selectedIndex].classList.add("lose");
      all[res.kingIndex].classList.add("win");
      resultBox.innerText = `❌ Lost! King was ${res.kingIndex}`;
    }

  } catch (err) {
    console.error(err);
    resultBox.innerText = "❌ Transaction failed";
  } finally {
    isPlaying = false;
  }
};

// INIT
renderCards();

</script>

</body>
</html>
