<!DOCTYPE html>
<html>
<head>
<title>Web3 Game Hub</title>

<!-- ✅ FIXED ETHERS v6 -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
}

.title {
  font-size: 36px;
  background: linear-gradient(90deg, #22c55e, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* WALLET */
.wallet-box {
  margin-top: 10px;
}

.wallet {
  font-size: 13px;
  color: #4ade80;
  word-break: break-all;
}

.connect-btn {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

/* GAME CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.1);
}

/* ICON */
.icon {
  font-size: 30px;
  margin-bottom: 10px;
}

/* NAME */
.name {
  font-size: 14px;
}

/* MOBILE */
@media(max-width:600px){
  .grid{
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🎮 Web3 Game Hub</div>

  <div class="wallet-box">
    <button class="connect-btn" onclick="connectWallet()">Connect Wallet</button>
    <div class="wallet" id="wallet"></div>
  </div>
</div>

<div class="grid">

  <div class="card" onclick="go('coinflip.html')">
    <div class="icon">💰</div>
    <div class="name">Coin Flip</div>
  </div>

  <div class="card" onclick="go('dice.html')">
    <div class="icon">🎲</div>
    <div class="name">Dice</div>
  </div>

  <div class="card" onclick="go('wheel.html')">
    <div class="icon">🎡</div>
    <div class="name">Lucky Wheel</div>
  </div>

  <div class="card" onclick="go('king.html')">
    <div class="icon">👑</div>
    <div class="name">Find the King</div>
  </div>

  <div class="card" onclick="go('tictactoe.html')">
    <div class="icon">❌</div>
    <div class="name">Tic Tac Toe</div>
  </div>

  <div class="card" onclick="go('snake.html')">
    <div class="icon">🐍</div>
    <div class="name">Snake</div>
  </div>

  <div class="card" onclick="go('memory.html')">
    <div class="icon">🧠</div>
    <div class="name">Memory</div>
  </div>

  <div class="card" onclick="go('reaction.html')">
    <div class="icon">⚡</div>
    <div class="name">Reaction</div>
  </div>

  <div class="card" onclick="go('runner.html')">
    <div class="icon">🏃</div>
    <div class="name">Runner</div>
  </div>

  <div class="card" onclick="go('puzzle.html')">
    <div class="icon">🧩</div>
    <div class="name">Puzzle</div>
  </div>

  <div class="card" onclick="go('mole.html')">
    <div class="icon">🔨</div>
    <div class="name">Whack-a-Mole</div>
  </div>
  
  <div class="card" onclick="go('clicker.html')">
    <div class="icon">👾</div>
    <div class="name">clicker</div>
  </div>

</div>

<script>

// 🔌 CONNECT WALLET (ETHERS v6)
async function connectWallet(){
  if(!window.ethereum){
    alert("Install MetaMask")
    return
  }

  try{
    const provider = new ethers.BrowserProvider(window.ethereum)
    const accounts = await provider.send("eth_requestAccounts", [])

    const account = accounts[0]

    localStorage.setItem("wallet", account)

    showWallet()

  } catch(err){
    console.error(err)
    alert("Wallet connection failed")
  }
}

// 📱 SHOW WALLET
function showWallet(){
  const wallet = localStorage.getItem("wallet")

  if(wallet){
    document.getElementById("wallet").innerText = "🟢 " + wallet
  }
}

// 🔗 NAVIGATION
function go(page){
  window.location.href = page
}

// 🔄 AUTO LOAD WALLET
showWallet()

</script>

</body>
</html>
