<!DOCTYPE html>
<html>
<body style="text-align:center;background:#111;color:white">

<h1>⚡ Reaction Game</h1>
<div id="box" style="width:200px;height:200px;background:red;margin:50px auto"></div>
<p id="result"></p>

<script>
let startTime

setTimeout(()=>{
document.getElementById("box").style.background="green"
startTime=Date.now()
},Math.random()*3000+2000)

document.getElementById("box").onclick=()=>{
let time=Date.now()-startTime
document.getElementById("result").innerText="Reaction: "+time+" ms"
}
</script>

</body>
</html>
