<!DOCTYPE html>
<html>
<body style="background:#111;color:white;text-align:center">

<h1>🏃 Runner</h1>
<canvas id="game" width="300" height="200"></canvas>

<script>
const c=document.getElementById("game")
const ctx=c.getContext("2d")

let player={y:150,vy:0}
let obstacle={x:300}
let gravity=0.5
let score=0

document.onkeydown=()=>{
player.vy=-8
}

function loop(){
ctx.clearRect(0,0,300,200)

player.vy+=gravity
player.y+=player.vy

if(player.y>150) player.y=150

obstacle.x-=5

if(obstacle.x<0){
obstacle.x=300
score++
}

ctx.fillRect(50,player.y,20,20)
ctx.fillRect(obstacle.x,150,20,20)

requestAnimationFrame(loop)
}

loop()
</script>

</body>
</html>
