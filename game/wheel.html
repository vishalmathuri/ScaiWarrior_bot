<!DOCTYPE html>
<html>
<head>
  <title>🎡 Wheel Game</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f172a);
      color: white;
      text-align: center;
    }

    .game-card {
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
      background: #111827;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,255,174,0.2);
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      width: 80%;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffae;
      cursor: pointer;
      font-weight: bold;
    }

    .wheel-container {
      position: relative;
      margin: 20px auto;
      width: 260px;
      height: 260px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid #00ffae;

      background: conic-gradient(
        #ff4d4d 0deg 45deg,
        #00ffae 45deg 90deg,
        #ff4d4d 90deg 135deg,
        #00ffae 135deg 180deg,
        #ff4d4d 180deg 225deg,
        #00ffae 225deg 270deg,
        #ff4d4d 270deg 315deg,
        #00ffae 315deg 360deg
      );
    }

    .label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center;
      font-size: 13px;
      font-weight: bold;
    }

    .pointer {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;

      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 20px solid #d4ff00;

      filter: drop-shadow(0 0 6px #00ffae);
    }
  </style>
</head>

<body>

<div class="game-card">
  <h2>🎡 Wheel Game</h2>

  <div class="wheel-container">
    <div class="pointer"></div>
    <div id="wheel" class="wheel"></div>
  </div>

  <input id="bet" type="number" step="0.01" placeholder="Enter bet (ETH)">
  <p id="betInfo"></p>

  <button onclick="spin()">SPIN</button>

  <h3 id="result">Waiting...</h3>
</div>

<script src="https://unpkg.com/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script type="module">
import { connectWallet, spinWheel } from "./game.js";

let isPlaying = false;

const multipliers = [0,120,0,140,0,160,0,180];

window.onload = async () => {
  await connectWallet();
  createLabels();
};

// bet preview
document.getElementById("bet").addEventListener("input", (e) => {
  const val = Number(e.target.value);

  if (!val || val <= 0) {
    document.getElementById("betInfo").innerHTML = "";
    return;
  }

  const outcomes = multipliers
    .filter(m => m > 0)
    .map(m => `${m/100}x = ${(val * m / 100).toFixed(4)} ETH`)
    .join("<br>");

  document.getElementById("betInfo").innerHTML =
    `💰 Bet: ${val.toFixed(4)} ETH <br>
     🎯 Possible Wins:<br>${outcomes}<br>
     ⚠️ Lose: ${val.toFixed(4)} ETH`;
});

// labels
function createLabels() {
  const wheel = document.getElementById("wheel");

  multipliers.forEach((m, i) => {
    const label = document.createElement("div");
    label.className = "label";
    label.id = "slice-" + i;

    const angle = i * 45 + 22.5;

    label.style.transform =
      `rotate(${angle}deg) translate(0, -105px) rotate(-${angle}deg)`;

    label.innerText = m === 0 ? "💀" : (m / 100) + "x";

    wheel.appendChild(label);
  });
}

// highlight winner
function highlightWinner(index) {
  document.querySelectorAll(".label").forEach(el => {
    el.style.color = "white";
    el.style.transform = el.style.transform.replace(" scale(1.4)", "");
  });

  const winner = document.getElementById("slice-" + index);

  if (winner) {
    winner.style.color = "#00ffae";
    winner.style.transform += " scale(1.4)";
    winner.style.textShadow = "0 0 10px #00ffae";
  }
}

// ✅ FINAL FIXED SPIN
async function spin() {

  if (isPlaying) return;

  const bet = Number(document.getElementById("bet").value);
  const resultBox = document.getElementById("result");

  if (!bet || bet <= 0) {
    resultBox.innerText = "⚠️ Enter valid bet";
    return;
  }

  try {
    isPlaying = true;
    resultBox.innerText = "⏳ Confirm in wallet...";

    const res = await spinWheel(bet);

    const index = Number(res.index);
    const multiplier = Number(res.multiplier);

    const wheel = document.getElementById("wheel");

    const segment = 360 / multipliers.length;
    const sliceCenter = index * segment + segment / 2;

    const spins = 5; // full spins
    const finalRotation =
      (spins * 360) - sliceCenter;

    wheel.style.transition = "transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
    wheel.style.transform = `rotate(${finalRotation}deg)`;

    setTimeout(() => {

      highlightWinner(index);

      if (multiplier > 0) {
        resultBox.innerText =
          `🎯 ${multiplier / 100}x\n🏆 Win: ${res.payout} ETH`;
      } else {
        resultBox.innerText =
          `💀 Lost ${bet.toFixed(4)} ETH`;
      }

      isPlaying = false;

    }, 3000);

  } catch (err) {
    console.error(err);
    resultBox.innerText = "❌ Transaction rejected";
    isPlaying = false;
  }
}

window.spin = spin;

</script>

</body>
</html>
